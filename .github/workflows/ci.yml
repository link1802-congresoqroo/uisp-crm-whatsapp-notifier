name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  plugin:
    name: Plugin (sintaxis PHP y manifest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Lint main.php
        run: php -l plugin/src/main.php
      - name: Validar manifest.json
        run: |
          php -r '
            json_decode(file_get_contents("plugin/src/manifest.json"));
            if (json_last_error() !== JSON_ERROR_NONE) {
              fwrite(STDERR, "manifest.json inválido: " . json_last_error_msg() . PHP_EOL);
              exit(1);
            }
            echo "manifest.json válido" . PHP_EOL;
          '
      - name: Verificar que el zip está sincronizado con plugin/src
        run: |
          mkdir -p /tmp/zip-check
          unzip -q plugin/uisp-recurring-invoice-webhook.zip -d /tmp/zip-check
          diff /tmp/zip-check/main.php plugin/src/main.php
          diff /tmp/zip-check/manifest.json plugin/src/manifest.json
          echo "El zip corresponde al código fuente ✓"

  audit:
    name: npm audit (informativo)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - run: npm audit --omit=dev --audit-level=high
